<title>เงินฉัน — มอนิเตอร์พอร์ตการเงิน</title>

<style>
:root{
  --bg:#f3f5f7; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e6eaef;
  --teal:#0f766e; --teal2:#14b8a6; --green:#16a34a; --red:#e11d48; --amber:#f59e0b;
  --blue:#2563eb; --purple:#7c3aed; --chip:#f1f5f9;
  --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
  --radius:18px;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#0b1220; --panel:#111a2b; --ink:#e8eef6; --muted:#8ea0b6; --line:#1f2b3f;
    --chip:#182236;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --bg:#0b1220; --panel:#111a2b; --ink:#e8eef6; --muted:#8ea0b6; --line:#1f2b3f;
  --chip:#182236;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Thai","Sarabun",system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  -webkit-font-smoothing:antialiased; font-size:15px; line-height:1.45;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
}
.app{max-width:640px;margin:0 auto;padding:0 14px}
.hidden{display:none!important}

/* header */
header.top{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--bg) 70%,transparent);
  padding:calc(10px + env(safe-area-inset-top)) 0 8px;
}
.top .row{display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.01em}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--teal2));
  display:grid;place-items:center;color:#fff;font-size:16px;box-shadow:var(--shadow)}
.brand small{display:block;font-weight:600;color:var(--muted);font-size:11px;letter-spacing:.02em}
.spacer{flex:1}
.iconbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink);width:38px;height:38px;
  border-radius:11px;display:grid;place-items:center;font-size:16px;cursor:pointer}
.iconbtn:active{transform:scale(.96)}
.yearpick{display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:3px 4px}
.yearpick button{border:0;background:transparent;color:var(--muted);width:30px;height:30px;border-radius:8px;
  font-size:17px;cursor:pointer}
.yearpick b{min-width:52px;text-align:center;font-weight:800}

/* view title */
h2.view-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:8px 2px 12px}
h2.view-title span{color:var(--muted);font-weight:600;font-size:13px;display:block;letter-spacing:0}

/* cards / panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;margin-bottom:14px}
.panel h3{margin:0 0 2px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.panel .sub{color:var(--muted);font-size:12px;margin:0 0 12px}

/* stat grid */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat .lab{color:var(--muted);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.stat .val{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:3px}
.stat .foot{font-size:11px;color:var(--muted);margin-top:2px}
.stat.good .val{color:var(--green)} .stat.bad .val{color:var(--red)}
.stat .bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}

/* buttons */
.btn{border:0;border-radius:12px;padding:11px 15px;font-size:14px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;justify-content:center;font-family:inherit}
.btn:active{transform:scale(.98)}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff;box-shadow:var(--shadow)}
.btn.ghost{background:var(--chip);color:var(--ink);border:1px solid var(--line)}
.btn.block{width:100%}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:10px}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--line)}

/* list item */
.item{border:1px solid var(--line);border-radius:15px;padding:13px 14px;margin-bottom:10px;background:var(--panel)}
.item .head{display:flex;align-items:center;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;flex:none}
.item .name{font-weight:800;flex:1}
.item .meta{color:var(--muted);font-size:12px;margin-top:2px}
.item .amt{font-weight:800}
.subitem{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px dashed var(--line);font-size:13px}
.subitem .sn{flex:1}
.subitem .sm2{color:var(--muted);font-size:11px}
.rowbtns{display:flex;gap:8px;margin-top:10px}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--chip);color:var(--muted)}
.tag.red{background:rgba(225,29,72,.12);color:var(--red)}
.tag.green{background:rgba(22,163,74,.14);color:var(--green)}
.tag.blue{background:rgba(37,99,235,.14);color:var(--blue)}
.empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:13px}
.empty .big{font-size:34px;margin-bottom:6px;opacity:.5}

/* bottom nav */
nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:color-mix(in srgb,var(--panel) 88%,transparent);
  backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
  border-top:1px solid var(--line);padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
.tabbar .inner{max-width:640px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr)}
.tabbtn{border:0;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:5px 0;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit}
.tabbtn .ic{font-size:20px;line-height:1}
.tabbtn.active{color:var(--teal2)}

/* modal */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(6,12,22,.5);display:flex;align-items:flex-end;justify-content:center;
  padding:0;opacity:0;pointer-events:none;transition:opacity .18s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{background:var(--panel);width:100%;max-width:640px;border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.3);
  max-height:92vh;overflow:auto;transform:translateY(20px);transition:transform .2s;padding:8px 16px calc(20px + env(safe-area-inset-bottom))}
.overlay.show .sheet{transform:translateY(0)}
.grab{width:40px;height:5px;border-radius:5px;background:var(--line);margin:8px auto 6px}
.sheet h3{font-size:18px;font-weight:800;margin:4px 2px 14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;border:1px solid var(--line);background:var(--bg);color:var(--ink);
  border-radius:12px;padding:12px 13px;font-size:15px;font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:var(--teal2)}
.field .hint{font-size:11px;color:var(--muted);margin-top:4px}
.field-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet .actions{display:flex;gap:10px;margin-top:8px}
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatches button{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.swatches button.sel{border-color:var(--ink);transform:scale(1.1)}

/* chart */
.chartwrap{width:100%;overflow-x:auto}
svg.chart{width:100%;height:auto;display:block}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:10px;justify-content:center}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.minibars{display:flex;gap:6px;align-items:flex-end;height:44px;margin-top:6px}
.minibars>div{flex:1;border-radius:3px 3px 0 0;min-height:2px}
.kv{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line)}
.kv:last-child{border-bottom:0}
.kv b{font-weight:800}
.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;
  z-index:80;opacity:0;transition:opacity .2s;box-shadow:var(--shadow)}
.toast.show{opacity:1}
.mtag{display:inline-block;font-size:11px;font-weight:700;color:var(--muted)}
.pill-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px}
.pill-row button{flex:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);
  border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.pill-row button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.stat{cursor:pointer}
.calgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.cal{border:1px solid var(--line);border-radius:12px;padding:8px 4px;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--panel)}
.cal:active{transform:scale(.96)}
.cal .cm{font-size:11px;font-weight:700;color:var(--muted)}
.cal .ca{font-size:15px;line-height:1}
.cal .cv{font-size:11px;font-weight:800}
.cal.pos{background:rgba(22,163,74,.10);border-color:rgba(22,163,74,.30)}
.cal.pos .ca,.cal.pos .cv{color:var(--green)}
.cal.neg{background:rgba(225,29,72,.10);border-color:rgba(225,29,72,.30)}
.cal.neg .ca,.cal.neg .cv{color:var(--red)}
@media (max-width:420px){.calgrid{grid-template-columns:repeat(4,1fr)}}
.gsav-toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--muted);
  cursor:pointer;margin:2px 0 12px;user-select:none}
.gsav-toggle .cbx{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;
  font-size:12px;color:#fff;flex:none}
.gsav-toggle .cbx.on{background:var(--teal);border-color:var(--teal)}
</style>

<div class="app">
  <header class="top">
    <div class="row">
      <div class="brand">
        <div class="logo">฿</div>
        <div>เงินฉัน<small>พอร์ตการเงินส่วนตัว</small></div>
      </div>
      <div class="spacer"></div>
      <div class="yearpick">
        <button id="yPrev">‹</button><b id="yLabel">2026</b><button id="yNext">›</button>
      </div>
      <button class="iconbtn" id="btnTheme" title="สลับโทนสว่าง/มืด">🌙</button>

  <main id="view"></main>
</div>

<nav class="tabbar">
  <div class="inner">
    <button class="tabbtn" data-tab="overview"><span class="ic">📊</span>ภาพรวม</button>
    <button class="tabbtn" data-tab="cards"><span class="ic">💳</span>บัตร/สินเชื่อ</button>
    <button class="tabbtn" data-tab="income"><span class="ic">💰</span>รายรับ-จ่าย</button>
    <button class="tabbtn" data-tab="realestate"><span class="ic">🏠</span>อสังหาฯ</button>
    <button class="tabbtn" data-tab="stocks"><span class="ic">📈</span>หุ้น</button>
  </div>
</nav>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================ STORE ============================ */
const KEY='finpocket_v1';
const PALETTE=['#0f766e','#2563eb','#e11d48','#f59e0b','#7c3aed','#0891b2','#db2777','#65a30d','#ea580c','#4f46e5'];
const now=new Date();
function defaultState(){
  return {version:1, ui:{tab:'overview', scope:'cash', year: now.getFullYear(), chart:{inc:true,exp:true,net:true}, selMonth: nowYM(), gsav:true, gHorizon:24, theme:null},
    settings:{cycleDay:15},
    savings:0, cards:[], incomes:[], expenses:[], realestate:[], stocks:[], actuals:{}};
}
function nowYM(){ return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'); }
let S=load();
function load(){ try{const r=JSON.parse(localStorage.getItem(KEY)); if(r&&r.version){
    const s=Object.assign(defaultState(),r);
    s.ui=Object.assign({tab:'overview',scope:'cash',year:now.getFullYear(),chart:{inc:true,exp:true,net:true},selMonth:nowYM(),gsav:true,gHorizon:24,theme:null}, s.ui||{});
    if(!s.ui.scope)s.ui.scope='cash';
    if(s.ui.gsav===undefined)s.ui.gsav=true;
    s.ui.chart=Object.assign({inc:true,exp:true,net:true}, s.ui.chart||{});
    s.settings=Object.assign({cycleDay:15}, s.settings||{});
    return s;
  }}catch(e){} return defaultState(); }
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
const uid=()=>Math.random().toString(36).slice(2,9);

/* ============================ HELPERS ============================ */
const el=id=>document.getElementById(id);
const TH_M=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function fmt(n){ n=Math.round(n||0); return (n<0?'-฿':'฿')+Math.abs(n).toLocaleString('en-US'); }
function fmtK(n){ n=Math.round(n||0); const a=Math.abs(n); let s; if(a>=1e6)s=(a/1e6).toFixed(a>=1e7?0:1)+'ล'; else if(a>=1000)s=(a/1000).toFixed(a>=1e5?0:1)+'k'; else s=''+a; return (n<0?'-':'')+'฿'+s; }
function num(v){ if(typeof v==='number')return v; return parseFloat(String(v).replace(/[^0-9.\-]/g,''))||0; }
function ym(y,m){ return y+'-'+String(m).padStart(2,'0'); }
function curYM(){ return ym(now.getFullYear(), now.getMonth()+1); }
function monthsOfYear(y){ return Array.from({length:12},(_,i)=>ym(y,i+1)); }
function addM(s,k){ let[y,m]=s.split('-').map(Number); let idx=y*12+(m-1)+k; return ym(Math.floor(idx/12),(idx%12)+1); }
function betweenM(a,b){ let[ya,ma]=a.split('-').map(Number),[yb,mb]=b.split('-').map(Number); return (yb*12+mb)-(ya*12+ma); }
const cmp=(a,b)=> a<b?-1:a>b?1:0;
function mLabel(s){ return TH_M[Number(s.split('-')[1])-1]; }
function mFull(s){ const[y,m]=s.split('-'); return TH_M[Number(m)-1]+' '+(Number(y)+543).toString().slice(2); }

/* ---- finance math ---- */
function instActive(i,s){ return cmp(s,i.startMonth)>=0 && cmp(s, addM(i.startMonth,i.months))<0; }
function instRemain(i,asOf){ const end=addM(i.startMonth,i.months); if(cmp(asOf,i.startMonth)<0)return i.months; if(cmp(asOf,end)>=0)return 0; return betweenM(asOf,end); }
function cardX(c,s){ const a=S.actuals[s]; if(a&&a[c.id]!=null)return a[c.id]; return c.defaultX||0; }
function cardInst(c,s){ return (c.installments||[]).filter(i=>instActive(i,s)).reduce((t,i)=>t+num(i.monthly),0); }
function cardBurden(c,s){ return cardInst(c,s)+cardX(c,s); }
function cardDebt(c,asOf){ return (c.installments||[]).reduce((t,i)=>t+instRemain(i,asOf)*num(i.monthly),0); }
function cardPayoff(c){ let last=null; (c.installments||[]).forEach(i=>{const e=addM(i.startMonth,i.months); if(!last||cmp(e,last)>0)last=e;}); return last; }
function incomeM(x,s){ if(x.recurring){ if(x.startMonth&&cmp(s,x.startMonth)<0)return 0; if(x.endMonth&&cmp(s,x.endMonth)>0)return 0; return num(x.amount);} return x.month===s?num(x.amount):0; }
function expenseM(x,s){ if(x.recurring){ if(x.startMonth&&cmp(s,x.startMonth)<0)return 0; if(x.endMonth&&cmp(s,x.endMonth)>0)return 0; return num(x.amount);} return x.month===s?num(x.amount):0; }
function reM(p,s){ let inst=0; if(p.installment&&cmp(s,p.startMonth)>=0&&cmp(s,addM(p.startMonth,p.months))<0)inst=num(p.installment);
  const rs=p.rentStart||p.startMonth; const on=cmp(s,rs)>=0; const rent=on?num(p.rent):0, fees=on?num(p.fees):0;
  return {inst,rent,fees,net:rent-inst-fees}; }
function reDebt(p,asOf){ const end=addM(p.startMonth,p.months); let rem; if(cmp(asOf,p.startMonth)<0)rem=p.months; else if(cmp(asOf,end)>=0)rem=0; else rem=betweenM(asOf,end); return rem*num(p.installment); }
function stockPnl(x,s){ return num(x.monthly&&x.monthly[s]); }
function stockValue(x,asOf){ let v=num(x.invested); Object.keys(x.monthly||{}).forEach(k=>{ if(cmp(k,asOf)<=0)v+=num(x.monthly[k]); }); return v; }
function monthAgg(s,scope){ let inc=0,exp=0;
  S.incomes.forEach(x=>inc+=incomeM(x,s));
  S.expenses.forEach(x=>exp+=expenseM(x,s));
  S.cards.forEach(c=>exp+=cardBurden(c,s));
  if(scope!=='cash'){
    S.realestate.forEach(p=>{const r=reM(p,s); inc+=r.rent; exp+=r.inst+r.fees;});
    S.stocks.forEach(x=>{const p=stockPnl(x,s); if(p>=0)inc+=p; else exp+=-p;});
  }
  return {inc,exp,net:inc-exp}; }
function totalDebt(asOf,scope){ let d=0; S.cards.forEach(c=>d+=cardDebt(c,asOf)); if(scope!=='cash')S.realestate.forEach(p=>d+=reDebt(p,asOf)); return d; }
function stocksValueTotal(asOf){ let v=0; S.stocks.forEach(x=>v+=stockValue(x,asOf)); return v; }
function fmtKplain(n){ n=Math.round(Math.abs(n||0)); if(n>=1e6)return (n/1e6).toFixed(n>=1e7?0:1)+'ล'; if(n>=1000)return (n/1000).toFixed(n>=1e5?0:1)+'k'; return ''+n; }
function niceMax(v){ if(v<=0)return 1; const p=Math.pow(10,Math.floor(Math.log10(v))); const n=v/p; let m; if(n<=1)m=1;else if(n<=2)m=2;else if(n<=2.5)m=2.5;else if(n<=5)m=5;else m=10; return m*p; }
function cardTypeLabel(t){ return t==='loan'?'<span class="tag blue">สินเชื่อ</span>':t==='cashadvance'?'<span class="tag red">บัตรกดเงินสด</span>':'<span class="tag">บัตรเครดิต</span>'; }

/* ============================ SVG CHARTS ============================ */
function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function svgTag(w,h,inner){ return `<div class="chartwrap"><svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${inner}</svg></div>`; }
function svgTagW(w,h,inner){ return `<div class="chartwrap"><svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMinYMid meet" style="width:${w}px;max-width:none;height:auto">${inner}</svg></div>`; }

function barPosNeg(rows, opts){ // rows:[{label,inc,exp,net}]
  opts=Object.assign({inc:true,exp:true,net:true}, opts||{});
  const w=680,h=292,padL=44,padR=10,padT=16,padB=28;
  const plotH=h-padT-padB, midY=padT+plotH*0.55, halfUp=midY-padT, halfDn=(padT+plotH)-midY;
  let maxA=0; rows.forEach(r=>{ if(opts.inc)maxA=Math.max(maxA,r.inc); if(opts.exp)maxA=Math.max(maxA,r.exp); if(opts.net)maxA=Math.max(maxA,Math.abs(r.net)); });
  maxA=niceMax(maxA||1);
  const n=rows.length, step=(w-padL-padR)/n, bw=Math.min(26,step*0.46);
  const line=css('--line'), muted=css('--muted');
  const yOf=val=> midY - (val/maxA)*(val>=0?halfUp:halfDn);
  let g='';
  [1,0.66,0.33,0,-0.33,-0.66,-1].forEach(f=>{ const y=yOf(maxA*f);
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="${line}" stroke-width="${f===0?1.4:1}" opacity="${f===0?1:.45}"/>`;
    g+=`<text x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9.5" fill="${muted}">${f===0?'0':(f>0?'+':'−')+fmtKplain(maxA*Math.abs(f))}</text>`;
  });
  let netPts=[];
  rows.forEach((r,i)=>{
    const cx=padL+step*i+step/2, bx=cx-bw/2;
    // income and expense stacked in the SAME column: green up from 0, red down from 0
    if(opts.inc){ const y=yOf(r.inc); g+=`<rect x="${bx.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${Math.max(0,midY-y).toFixed(1)}" rx="3" fill="${css('--green')}" opacity=".92"/>`; }
    if(opts.exp){ const y=yOf(-r.exp); g+=`<rect x="${bx.toFixed(1)}" y="${midY}" width="${bw}" height="${Math.max(0,y-midY).toFixed(1)}" rx="3" fill="${css('--red')}" opacity=".85"/>`; }
    netPts.push([cx, yOf(r.net)]);
    g+=`<text x="${cx}" y="${h-9}" text-anchor="middle" font-size="9.5" fill="${muted}">${r.label}</text>`;
  });
  if(opts.net){
    const path=netPts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    g+=`<path d="${path}" fill="none" stroke="${css('--blue')}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    netPts.forEach(p=>{g+=`<circle cx="${p[0]}" cy="${p[1]}" r="2.6" fill="${css('--blue')}"/>`;});
  }
  return svgTag(w,h,g);
}

function donut(segs){ // [{label,value,color}]
  const total=segs.reduce((t,s)=>t+Math.max(0,s.value),0);
  const w=220,h=220,cx=110,cy=110,r=80,sw=26;
  if(total<=0) return svgTag(w,h,`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${css('--line')}" stroke-width="${sw}"/><text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="13" fill="${css('--muted')}">ยังไม่มีข้อมูล</text>`);
  let a=-Math.PI/2, g='';
  segs.forEach(s=>{ const v=Math.max(0,s.value); if(v<=0)return; const ang=v/total*Math.PI*2, a2=a+ang;
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=ang>Math.PI?1:0;
    g+=`<path d="M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-linecap="butt"/>`;
    a=a2; });
  g+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" fill="${css('--muted')}">รวมสินทรัพย์</text>`;
  g+=`<text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="17" font-weight="800" fill="${css('--ink')}">${fmtK(total)}</text>`;
  return svgTag(w,h,g);
}

function lineChart(rows,color){ // [{label,value}]
  const padL=52,padR=14,padT=16,padB=28,h=210;
  const n=rows.length;
  const w=Math.max(680, padL+padR+n*20);
  const plotH=h-padT-padB, plotW=w-padL-padR;
  let max=0; rows.forEach(r=>max=Math.max(max,r.value));
  const step0=niceStep((max||1)*1.05,4); const hi=Math.max(step0, Math.ceil(max/step0)*step0);
  const line=css('--line'),muted=css('--muted');
  const stepX=n>1?plotW/(n-1):0;
  const yOf=v=> padT + (hi-v)/hi*plotH;
  let g='';
  for(let val=0; val<=hi+1e-6; val+=step0){ const y=yOf(val);
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="${line}" opacity="${val===0?1:.4}"/>`;
    g+=`<text x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9.5" fill="${muted}">${fmtKplain(val)}</text>`; }
  const pts=rows.map((r,i)=>[padL+stepX*i, yOf(r.value)]);
  const area=`M ${pts[0][0]} ${yOf(0)} `+pts.map(p=>'L '+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L ${pts[pts.length-1][0]} ${yOf(0)} Z`;
  g+=`<path d="${area}" fill="${color}" opacity=".12"/>`;
  g+=`<path d="${pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${color}" stroke-width="2.6" stroke-linejoin="round"/>`;
  rows.forEach((r,i)=>{ if(r.label) g+=`<text x="${pts[i][0]}" y="${h-8}" text-anchor="middle" font-size="9" fill="${muted}">${r.label}</text>`; });
  return svgTagW(w,h,g);
}

/* ---------- growth projection ---------- */
function growthRows(startVal, fromM, count, scope){ let rows=[], run=startVal, mm=fromM;
  const lblEvery=count<=12?1:count<=24?2:count<=36?3:6;
  for(let i=0;i<count;i++){ if(i>0){ mm=addM(mm,1); run+=monthAgg(mm,scope).net; } rows.push({label:(i%lblEvery===0)?mFull(mm):'', value:run}); }
  return rows; }
function niceStep(range,divs){ const raw=range/divs; const p=Math.pow(10,Math.floor(Math.log10(raw))); const n=raw/p; let m; if(n<=1)m=1;else if(n<=2)m=2;else if(n<=2.5)m=2.5;else if(n<=5)m=5;else m=10; return m*p; }
function growthChart(rows){
  const padL=52,padR=14,padT=16,padB=28, h=246;
  const n=rows.length;
  const w=Math.max(680, padL+padR+ n*26);   // ยิ่งเดือนเยอะยิ่งกว้าง (เลื่อนดู=ซูม)
  const plotH=h-padT-padB, plotW=w-padL-padR;
  let mn=0,mx=0; rows.forEach(r=>{mn=Math.min(mn,r.value);mx=Math.max(mx,r.value);});
  // นิ่ง grid ด้วยขั้นกลมๆ ละเอียดขึ้น
  const rawSpan=(mx-mn)||1; const step0=niceStep(rawSpan*1.1, 6);
  let lo=Math.floor(mn/step0)*step0, hi=Math.ceil(mx/step0)*step0; if(hi===lo)hi=lo+step0;
  const line=css('--line'),muted=css('--muted');
  const stepX=n>1?plotW/(n-1):0;
  const yOf=v=> padT + (hi-v)/(hi-lo)*plotH;
  let g='';
  for(let val=lo; val<=hi+1e-6; val+=step0){ const y=yOf(val); const zero=Math.abs(val)<1e-6;
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="${line}" stroke-width="${zero?1.4:1}" opacity="${zero?1:.4}"/>`;
    g+=`<text x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9.5" fill="${muted}">${val<0?'−':''}${fmtKplain(val)}</text>`; }
  const pts=rows.map((r,i)=>[padL+stepX*i, yOf(r.value)]);
  const color=rows[rows.length-1].value>=rows[0].value?css('--teal2'):css('--red');
  const baseY=(lo<0&&hi>0)?yOf(0):padT+plotH;
  g+=`<path d="M ${pts[0][0]} ${baseY} `+pts.map(p=>'L '+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L ${pts[pts.length-1][0]} ${baseY} Z" fill="${color}" opacity=".13"/>`;
  g+=`<path d="${pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${color}" stroke-width="2.6" stroke-linejoin="round"/>`;
  rows.forEach((r,i)=>{ if(r.label) g+=`<text x="${pts[i][0]}" y="${h-8}" text-anchor="middle" font-size="9" fill="${muted}">${r.label}</text>`; });
  g+=`<circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="3.6" fill="${color}"/>`;
  return svgTagW(w,h,g);
}

/* ---------- cycle (15->15) + detail helpers ---------- */
function cycleAgg(M,scope){
  const cd=S.settings.cycleDay||15; const prev=addM(M,-1);
  let inc=0,exp=0;
  S.incomes.forEach(x=>{ if(x.recurring){ const om=(x.day||1)>=cd?prev:M; inc+=incomeM(x,om); } else { inc+=incomeM(x,M); } });
  S.expenses.forEach(x=>{ if(x.recurring){ const om=(x.day||1)>=cd?prev:M; exp+=expenseM(x,om); } else { exp+=expenseM(x,M); } });
  S.cards.forEach(c=>{ const dd=c.dueDay||cd; const dm=dd>=cd?prev:M; exp+=cardBurden(c,dm); });
  if(scope!=='cash'){
    S.realestate.forEach(p=>{ const r=reM(p,M); inc+=r.rent; exp+=r.inst+r.fees; });

}
function cycleSheet(M){

function monthDetailBody(s,scope){
  let inc=[],exp=[];
  S.incomes.forEach(x=>{const v=incomeM(x,s); if(v>0)inc.push([x.name+(x.recurring?(' · วันที่ '+(x.day||'-')):''),v]);});
  S.expenses.forEach(x=>{const v=expenseM(x,s); if(v>0)exp.push([x.name+(x.recurring?(' · วันที่ '+(x.day||'-')):' (เฉพาะกิจ)'),v,css('--amber')]);});
  S.cards.forEach(c=>{const b=cardBurden(c,s); if(b<=0)return; const parts=[]; (c.installments||[]).filter(i=>instActive(i,s)).forEach(i=>parts.push(i.name+' '+fmtK(i.monthly))); const x=cardX(c,s); if(x>0)parts.push('X '+fmtK(x));
    exp.push([c.name+(c.billingDay?(' · ตัดบัตร '+c.billingDay):''),b,c.color,parts.join(' + ')]);});
  if(scope!=='cash'){
    S.realestate.forEach(p=>{const r=reM(p,s); if(r.rent>0)inc.push([p.name+' (ค่าเช่า)',r.rent]); if(r.inst+r.fees>0)exp.push([p.name+' (งวด+ส่วนกลาง)',r.inst+r.fees,css('--purple')]);});
    S.stocks.forEach(x=>{const p=stockPnl(x,s); if(p>0)inc.push([x.name+' (กำไร)',p]); else if(p<0)exp.push([x.name+' (ขาดทุน)',-p,css('--teal2')]);});
  }
  const incSum=inc.reduce((t,r)=>t+r[1],0), expSum=exp.reduce((t,r)=>t+r[1],0);
  let h=`<div style="font-size:12px;color:var(--muted);font-weight:700;margin:6px 0 4px">💚 รายรับ</div>`;
  h+= inc.length? inc.map(r=>`<div class="kv"><span>${r[0]}</span><b style="color:${css('--green')}">+${fmt(r[1])}</b></div>`).join('') : `<div class="kv"><span style="color:var(--muted)">— ไม่มี —</span></div>`;
  h+=`<div style="font-size:12px;color:var(--muted);font-weight:700;margin:12px 0 4px">🔻 รายจ่าย / ภาระ</div>`;
  h+= exp.length? exp.map(r=>`<div class="kv"><span><i style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${r[2]||css('--red')};margin-right:6px"></i>${r[0]}${r[3]?`<div style="color:var(--muted);font-size:11px;margin-left:15px">${r[3]}</div>`:''}</span><b style="color:${css('--red')}">-${fmt(r[1])}</b></div>`).join('') : `<div class="kv"><span style="color:var(--muted)">— ไม่มี —</span></div>`;
  h+=`<div class="kv" style="border-top:2px solid var(--line);margin-top:8px;padding-top:8px"><span>รายรับรวม</span><b style="color:${css('--green')}">${fmt(incSum)}</b></div>`;
  h+=`<div class="kv"><span>รายจ่ายรวม</span><b style="color:${css('--red')}">${fmt(expSum)}</b></div>`;
  h+=`<div class="kv"><span><b>คงเหลือสุทธิ</b></span><b style="font-size:17px;color:${incSum-expSum>=0?css('--green'):css('--red')}">${fmt(incSum-expSum)}</b></div>`;
  return h;
}
function breakdownSheet(type){
  const asOf=curYM(); const scope=S.ui.scope||'cash'; const cash=scope==='cash';
  const line=(label,val,color)=>`<div class="kv"><span>${label}</span><b style="color:${color||'inherit'}">${fmt(val)}</b></div>`;
  if(type==='month'){ openSheet('รายละเอียดเดือน '+mFull(asOf), monthDetailBody(asOf,scope), null,'ปิด'); el('mSave').onclick=closeSheet; return; }
  let title,rowsHtml='',total=0;
  if(type==='networth'){
    title=cash?'เงินสดสุทธิ คิดจาก':'มูลค่าสุทธิ คิดจาก';
    const sv=cash?0:stocksValueTotal(asOf), rv=cash?0:S.realestate.reduce((t,p)=>t+num(p.value),0), db=totalDebt(asOf,scope);
    rowsHtml+=line('เงินเก็บ/เงินสด',S.savings,css('--blue'));
    if(!cash){ rowsHtml+=line('หุ้น (มูลค่าประเมิน)',sv,css('--teal2')); rowsHtml+=line('อสังหาฯ (มูลค่า)',rv,css('--purple')); }
    rowsHtml+=line(cash?'หนี้บัตร/สินเชื่อ':'หนี้คงเหลือ',-db,css('--red'));
    total=S.savings+sv+rv-db;
  } else {
    title=cash?'หนี้บัตร/สินเชื่อ คิดจาก':'หนี้คงเหลือรวม คิดจาก';
    S.cards.forEach(c=>{const d=cardDebt(c,asOf); if(d>0)rowsHtml+=`<div class="kv"><span><i style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c.color};margin-right:6px"></i>${c.name} ${cardTypeLabel(c.type)}</span><b style="color:${css('--red')}">${fmt(d)}</b></div>`;});
    if(!cash)S.realestate.forEach(p=>{const d=reDebt(p,asOf); if(d>0)rowsHtml+=line(p.name+' (ค่างวดคงเหลือ)',d,css('--red'));});
    if(!rowsHtml)rowsHtml=`<div class="kv"><span style="color:var(--muted)">ไม่มีหนี้ 🎉</span></div>`;
    total=totalDebt(asOf,scope);
  }
  rowsHtml+=`<div class="kv" style="border-top:2px solid var(--line);margin-top:4px;padding-top:8px"><span><b>รวม</b></span><b style="font-size:17px">${fmt(total)}</b></div>`;
  openSheet(title, rowsHtml, null,'ปิด'); el('mSave').onclick=closeSheet;
}

      <div class="rowbtns"><button class="btn ghost sm" onclick="stockPnlForm('${x.id}')">✍️ กรอกผลรายเดือน</button><button class="btn ghost sm" onclick="editStock('${x.id}')">แก้ไข</button><button class="btn danger sm" onclick="delStock('${x.id}')">ลบ</button></div></div>`;
  });

}

/* ============================ MODAL / FORMS ============================ */
let onSubmit=null;
function openSheet(title, bodyHTML, submit, saveLabel='บันทึก'){
  onSubmit=submit;
  el('sheet').innerHTML=`<div class="grab"></div><h3>${title}</h3>${bodyHTML}
    <div class="actions"><button class="btn ghost" id="mCancel" style="flex:1">ยกเลิก</button>
    <button class="btn primary" id="mSave" style="flex:2">${saveLabel}</button></div>`;
  el('overlay').classList.add('show');
  el('mCancel').onclick=closeSheet;
  el('mSave').onclick=()=>{ if(onSubmit&&onSubmit()!==false) closeSheet(); };
}
function closeSheet(){ el('overlay').classList.remove('show'); onSubmit=null; }
el('overlay').addEventListener('click',e=>{ if(e.target===el('overlay')) closeSheet(); });

function fVal(id){ return el(id).value; }
function fNum(id){ return num(el(id).value); }
function fieldText(id,label,val='',ph='',type='text',hint=''){ return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${val??''}" placeholder="${ph}" ${type==='number'?'inputmode="decimal"':''}>${hint?`<div class="hint">${hint}</div>`:''}</div>`; }
function fieldMonth(id,label,val){ return `<div class="field"><label>${label}</label><input id="${id}" type="month" value="${val||curYM()}"></div>`; }
function fieldSelect(id,label,opts,val){ return `<div class="field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option value="${o.v}" ${o.v===val?'selected':''}>${o.t}</option>`).join('')}</select></div>`; }
function fieldColor(id,val){ return `<div class="field"><label>สี</label><div class="swatches" id="${id}">${PALETTE.map(c=>`<button type="button" data-c="${c}" class="${c===val?'sel':''}" style="background:${c}"></button>`).join('')}</div></div>`; }
function bindSwatch(id){ const w=el(id); w.querySelectorAll('button').forEach(b=>b.onclick=()=>{w.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');w.dataset.c=b.dataset.c;}); w.dataset.c=w.querySelector('.sel')?.dataset.c||PALETTE[0]; }

/* ----- Monthly summary (X per card + backdate) ----- */
function monthlySheet(startM){
  const buildBody=(m)=>{
    let body=`<div class="hint" style="margin:2px 2px 12px">กำลังบันทึกของเดือน <b style="color:var(--teal2)">${mFull(m)}</b> · ใส่ยอดใช้จ่ายจริงที่ไม่ใช่รายการผ่อน (ค่ากิน/น้ำมัน/ของจิปาถะ) ของแต่ละบัตร · เปลี่ยนเดือนด้านบนเพื่อกรอกย้อนหลัง/ล่วงหน้าได้</div>`;
    if(!S.cards.length) body+=`<div class="empty">ยังไม่มีบัตร เพิ่มบัตรก่อนนะ</div>`;
    S.cards.forEach(c=>{ const cur=(S.actuals[m]&&S.actuals[m][c.id]!=null)?S.actuals[m][c.id]:'';
      body+=`<div class="field"><label><span class="dot" style="display:inline-block;background:${c.color};vertical-align:middle;margin-right:6px"></span>${c.name} <span class="mtag">(ค่าเริ่มต้น X = ${fmtK(c.defaultX||0)})</span></label><input id="x_${c.id}" type="number" inputmode="decimal" value="${cur}" placeholder="${c.defaultX||0}"></div>`; });
    if(S.stocks.length){ body+=`<div style="height:1px;background:var(--line);margin:8px 0 14px"></div><div class="field"><label><b>ผลหุ้นเดือนนี้ (ไม่บังคับ)</b></label></div>`;
      S.stocks.forEach(x=>{ const cur=(x.monthly&&x.monthly[m]!=null)?x.monthly[m]:''; body+=`<div class="field"><label>${x.name} — กำไร(+)/ขาดทุน(−)</label><input id="sp_${x.id}" type="number" inputmode="decimal" value="${cur}" placeholder="0"></div>`; });
    }
    return body;
  };
  const startMonth = startM || curYM();
  const bodyHtml = fieldMonth('mm','เลือกเดือน (กรอกย้อนหลัง/ล่วงหน้าได้)', startMonth)
    + `<div id="mBody">${buildBody(startMonth)}</div>`;
  const submit=()=>{
    const m=el('mm').value;
    S.actuals[m]=S.actuals[m]||{};
    S.cards.forEach(c=>{ const e=el('x_'+c.id); if(!e)return; const v=e.value.trim(); if(v==='')delete S.actuals[m][c.id]; else S.actuals[m][c.id]=num(v); });
    if(Object.keys(S.actuals[m]).length===0)delete S.actuals[m];
    S.stocks.forEach(x=>{ const e=el('sp_'+x.id); if(!e)return; x.monthly=x.monthly||{}; const v=e.value.trim(); if(v==='')delete x.monthly[m]; else x.monthly[m]=num(v); });
    save();render();toast('อัปเดตเดือน '+mFull(m)+' แล้ว');
  };
  openSheet('บันทึกยอดใช้จ่ายรายเดือน', bodyHtml, submit, 'บันทึกเดือนนี้');
  el('mm').onchange=()=>{ el('mBody').innerHTML=buildBody(el('mm').value); };
}

function exportData(){ const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='เงินฉัน-สำรองข้อมูล-'+curYM()+'.json'; a.click(); toast('ส่งออกแล้ว'); }
function importData(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.version)throw 0; S=Object.assign(defaultState(),d); save();closeSheet();render();toast('นำเข้าข้อมูลสำเร็จ'); }catch(err){ toast('ไฟล์ไม่ถูกต้อง'); } };
  r.readAsText(f); }

/* ============================ TOAST + NAV ============================ */
let toastT;
function toast(msg){ const t=el('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }
document.querySelectorAll('.tabbtn').forEach(b=>b.onclick=()=>{S.ui.tab=b.dataset.tab;save();render();});
el('yPrev').onclick=()=>{S.ui.year--;save();render();};
el('yNext').onclick=()=>{S.ui.year++;save();render();};

/* ============================ THEME ============================ */
function isDark(){ return S.ui.theme ? S.ui.theme==='dark' : window.matchMedia('(prefers-color-scheme: dark)').matches; }
function applyTheme(){ if(S.ui.theme)document.documentElement.setAttribute('data-theme',S.ui.theme); else document.documentElement.removeAttribute('data-theme'); el('btnTheme').textContent=isDark()?'☀️':'🌙'; }
el('btnTheme').onclick=()=>{ S.ui.theme=isDark()?'light':'dark'; save(); applyTheme(); render(); };
applyTheme();

/* ============================ START ============================ */
render();
</script>
